version: '3.8'

services:
  shield-ctrl:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shield-ctrl
    network_mode: host
    privileged: true
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
    volumes:
      - /sys/fs/bpf:/sys/fs/bpf
      - ./conf:/opt/shield-core/conf
      - ./logs:/opt/shield-core/logs
    environment:
      - SHIELD_IFACE=eth0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-k", "-f", "https://localhost:9090/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
